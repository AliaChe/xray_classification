name: Build and Push Docker Image

on:
  push:
    branches:
      - master

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dev requirements
        run: pip install -r requirements/dev.txt

      - name: Run Ruff
        run: ruff check .

      - name: Check format
        run: ruff format --check .

      - name: Run tests
        run: python -m pytest -v

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t alia123/xray-api:latest .

      - name: Push Docker image
        run: docker push alia123/xray-api:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script:
            docker stop xray-api || true

            docker rm xray-api || true

            docker rmi alia123/xray-api:latest || true

            docker image prune -f

            docker pull alia123/xray-api:latest

            docker run -d \
              --name xray-api \
              --restart unless-stopped \
              -p 8000:8000 \
              alia123/xray-api:latest
